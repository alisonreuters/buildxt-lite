// BUILDXT DECK RULES ENGINE v1.0
// Single source of truth. Jeff calls calcDeck(inputs).
// All drawing components read ONLY from this output.
// ============================================================

function calcDeck(inputs) {
  const {
    Lm, Dm, FFL,
    boardDir, deckingType, boardWidthMm,
    balustradeType,
    hasStairs, stairFace, stairWidthMm,
    houseWall,
  } = inputs;

  const hasBal = balustradeType && balustradeType !== "none";

  // ── RULE: STAIR GEOMETRY (AS1657) ────────────────────────
  let stair = null;
  if (hasStairs) {
    const nRisers  = Math.max(1, Math.ceil(FFL / 180));
    const riser    = Math.round(FFL / nRisers);
    const going    = 300;
    const stairRun = nRisers * going;
    const hyp      = Math.round(Math.sqrt(FFL*FFL + stairRun*stairRun));
    const angle    = Math.round(Math.atan2(FFL, stairRun) * 180 / Math.PI);
    const nStr     = 2 + Math.floor((stairWidthMm||1200) / 2000);
    if (angle < 20 || angle > 45) throw new Error(`Stair angle ${angle}deg out of 20-45 range`);
    if (riser > 180) throw new Error(`Riser ${riser}mm exceeds AS1657 max 180mm`);
    stair = {
      nRisers, riser, going, stairRun, hyp, angle, nStr,
      strLen: hyp + 300,
      strTimber: { D:300, W:45 },
      strPad:    { W:300, D:300, H:60 },
    };
  }

  // ── RULE: MEMBER SIZING ───────────────────────────────────
  const joist   = { D: FFL > 1800 ? 140 : 90, W:45, grade:"H3", spacingMm:450 };
  const bearer  = { D:140, W:45, grade:"H4", nMembers: hasBal ? 2 : 1,
                    label: hasBal ? "2/140x45 H4" : "140x45 H4" };
  const facia   = { D: joist.D, W:19, note:"Same timber as decking" };
  const decking = { D:19, W: boardWidthMm||90 };
  const balH    = hasBal ? (FFL >= 1000 ? 1200 : 1000) : 0;

  // ── RULE: PIER HEIGHT ─────────────────────────────────────
  const pierH = Math.max(50, FFL - bearer.D - joist.D - decking.D);

  // ── RULE: FOOTING GRID ────────────────────────────────────
  const nBearerRows  = Math.ceil(Dm * 1000 / 1800) + 1;
  const nPostsPerRow = Math.ceil(Lm * 1000 / 1800) + 1;
  const nFootings    = nBearerRows * nPostsPerRow;
  const footing      = { W:400, D:400, H:400, bagsEach:4 };

  // ── RULE: SECTION CUT DIRECTION ──────────────────────────
  // Section A-A always cuts perpendicular to board direction
  // Section A-A cuts perpendicular to joists (which run perpendicular to boards)
  // EW boards → NS joists → section cuts EW (view from N or S)
  // NS boards → EW joists → section cuts NS (view from E or W)
  const sectionCutDir = boardDir === "EW" ? "EW" : "NS";

  // ── QUANTITIES ────────────────────────────────────────────
  const deckAreaM2  = Lm * Dm;
  const deckingLM   = Math.ceil((Dm*1000/decking.W) * 1.1) * Lm;
  const joistLM     = Math.ceil(Dm*1000/joist.spacingMm + 1) * Lm;
  const bearerLM    = nBearerRows * Lm;
  const faciaLM     = 2 * (Lm + Dm);
  const balLM       = hasBal ? faciaLM : 0;
  const concBags    = nFootings * footing.bagsEach;
  const stairQty    = stair ? {
    stringerLM : stair.nStr * stair.strLen / 1000,
    treadLM    : stair.nRisers * ((stairWidthMm||1200) / 1000),
    padCount   : stair.nStr,
  } : null;

  // ── DRAWING PARAMETER SET ─────────────────────────────────
  // This is ALL the drawing components need. Nothing else.
  const draw = {
    Lm, Dm, FFL, boardDir, houseWall,
    deckWmm: Lm*1000, deckDmm: Dm*1000,
    hasBal, balH,
    hasStairs, stairFace,
    stairWidthMm: stairWidthMm||1200,
    stair,
    pierH,
    joist, bearer, facia, decking, footing,
    nBearerRows, nPostsPerRow,
    sectionCutDir,
  };

  return { inputs, stair, joist, bearer, facia, decking, balH,
           pierH, nBearerRows, nPostsPerRow, nFootings, footing,
           deckAreaM2, qty:{ deckingLM, joistLM, bearerLM, faciaLM,
           balLM, concBags, stairQty }, draw };
}

// ============================================================
// BUILDXT DECK DRAWING COMPONENTS v1.0
// Each component takes draw params from calcDeck().draw
// and a scale factor SC (px per mm)
// Components return arrays of SVG element descriptors
// ============================================================

// ── COMPONENT: STRINGER (validated) ──────────────────────────
// Solid 300x45 notched stringer with treads on horizontal cuts
// origin: OX=deck edge x, OY=FFL y, GY=ground y
function stairComponent(draw, SC, OX, OY, GY) {
  const { stair, decking } = draw;
  if (!stair) return [];
  const { nRisers, riser, going, stairRun } = stair;

  const gW   = going * SC;            // going px
  const rH   = riser * SC;            // riser px
  const stW  = stairRun * SC;         // total run px
  const DKpx = Math.max(3, decking.D * SC); // tread thickness px
  const strD = Math.max(5, 300 * SC * 0.4); // stringer depth px

  // Bottom face normal vector — perpendicular pointing INTO stringer body
  const ddx = stW, ddy = GY - OY;
  const dlen = Math.sqrt(ddx*ddx + ddy*ddy);
  const fnx = -(ddy/dlen) * strD;    // left
  const fny =  (ddx/dlen) * strD;    // down

  // Top edge: zig-zag notched profile
  const top = [[OX, OY]];
  for (let i = 0; i < nRisers; i++) {
    top.push([OX + (i+1)*gW, OY + i*rH]);     // horizontal going
    top.push([OX + (i+1)*gW, OY + (i+1)*rH]); // vertical riser
  }
  // Close with bottom face
  const pts = [...top, [OX+stW+fnx, GY+fny], [OX+fnx, OY+fny]];
  const poly = pts.map(([px,py]) => `${px.toFixed(1)},${py.toFixed(1)}`).join(' ');

  // Treads on each horizontal notch
  const treads = Array.from({length: nRisers}, (_, i) => ({
    x: OX + i*gW, y: OY + i*rH,
    w: gW, h: DKpx,
  }));

  // Stringer footing pads — 300x300x60mm at each stringer base
  const padW = stair.strPad.W * SC;
  const padH = Math.max(4, stair.strPad.H * SC);
  const padX = OX + stW - padW/2;

  return { poly, treads, padX, padY:GY, padW, padH, stW, stairRun, nRisers };
}

// ── COMPONENT: DECK SECTION (validated) ──────────────────────
// Returns all the y-coordinates and heights for the deck stack
// so every element lines up correctly
function deckSectionLayout(draw, SC, FFL_Y) {
  const { FFL, joist, bearer, decking, facia, hasBal, balH, pierH, footing } = draw;

  const DKpx  = Math.max(3,  decking.D * SC);
  const JTpx  = Math.max(8,  joist.D   * SC);
  const BRpx  = Math.max(12, bearer.D  * SC);
  const PIRpx = pierH * SC;
  const PADpx = footing.H * SC;
  const BALpx = hasBal ? Math.max(40, balH * SC) : 0;
  const FACpx = Math.max(3, facia.W * SC);

  const DK_TOP  = FFL_Y;
  const JT_TOP  = DK_TOP + DKpx;
  const BR_TOP  = JT_TOP + JTpx;
  const BR_BOT  = BR_TOP + BRpx;
  const PIR_TOP = BR_BOT;
  const GY      = PIR_TOP + PIRpx;
  const PAD_BOT = GY + PADpx;
  const BAL_TOP = hasBal ? FFL_Y - BALpx : FFL_Y;

  return {
    DKpx, JTpx, BRpx, PIRpx, PADpx, BALpx, FACpx,
    DK_TOP, JT_TOP, BR_TOP, BR_BOT, PIR_TOP,
    GY, PAD_BOT, BAL_TOP,
    FFL_Y,
  };
}

  if(n>=4000&&n<=4299)return{region:"C",terrain:"TC2",desc:"Queensland coastal — cyclonic zone"};

  if(n>=2000&&n<=2999)return{region:"A3",terrain:"TC2",desc:"NSW suburban"};
  // VIC
  if(n>=3000&&n<=3999)return{region:"A3",terrain:"TC2",desc:"Victoria"};
  // WA coastal
  if(n>=6000&&n<=6214)return{region:"A5",terrain:"TC1",desc:"WA coastal"};
  if(n>=6000&&n<=6999)return{region:"A3",terrain:"TC2",desc:"WA inland"};
  // SA
  if(n>=5000&&n<=5999)return{region:"A3",terrain:"TC2",desc:"South Australia"};

function structRules(L,D,hmm,hasBal,boardDir){
  const high=hmm>1800;
  const maxPostSpacing=high?1.5:1.8; // max post spacing along bearer
  const maxBearerSpan=1.8;           // max bearer spacing — joists span between bearers (AS1684)

  // Board direction determines bearer/joist orientation:
  // E-W boards → joists run N-S → bearers run E-W → posts along E-W at maxPostSpacing
  // N-S boards → joists run E-W → bearers run N-S → posts along N-S at maxPostSpacing
  const isEW=(boardDir||"EW")==="EW";

  // CORRECT STRUCTURAL LOGIC:
  // Boards EW → Joists NS (perpendicular to boards) → Bearers EW (perpendicular to joists)
  // Boards NS → Joists EW (perpendicular to boards) → Bearers NS (perpendicular to joists)
  // Bearers always run SAME direction as boards
  // Joists always run PERPENDICULAR to boards

  // Bearer rows run along their length — bearers span across the SHORT joist direction
  // For EW boards: bearers run EW (length=L), spaced along D at maxBearerSpan (joist span)
  // For NS boards: bearers run NS (length=D), spaced along L at maxBearerSpan (joist span)
  const bearerLength= isEW ? L : D;        // how long each bearer is
  const joistSpanDim= isEW ? D : L;        // dimension joists span across (between bearers)
  const postRunDim=   isEW ? L : D;        // dimension posts run along (along bearer)

  const nBearerRows= Math.ceil(joistSpanDim/maxBearerSpan)+1;
  const nPostsPerBearer= Math.ceil(postRunDim/maxPostSpacing)+1;

  // Bearer positions spaced across joist span dimension
  const bearerPositions=Array.from({length:nBearerRows},(_,i)=>
    i*(joistSpanDim/Math.max(1,nBearerRows-1))
  );
  // Post positions along bearer length
  const postPositions=Array.from({length:nPostsPerBearer},(_,i)=>
    i*(postRunDim/Math.max(1,nPostsPerBearer-1))
  );

  const nFootings=nBearerRows*nPostsPerBearer;

  // Bearer lengths: perimeter bearers + internal bearers
  // Perimeter = 4 sides. Internal = (nBearerRows-2) rows
  const bearerRunLength=isEW?L:D;
  const perimBearerLm=bearerRunLength*4; // 4 perimeter sides (approx — 2 long + 2 short)
  const internalBearerLm=bearerRunLength*Math.max(0,nBearerRows-2);
  // Double perimeter bearers if balustrade, single internal
  const totalBearerLm=Math.ceil((hasBal?perimBearerLm*2:perimBearerLm)+internalBearerLm);

  // Joist length and count
  // Joists run PERPENDICULAR to boards, spanning between bearers
  // For EW boards: joists run NS, spanning D, spaced along L
  // For NS boards: joists run EW, spanning L, spaced along D
  const joistSpan=isEW?D:L;    // joist length = spans across bearer rows
  const joistRun=isEW?L:D;     // joists spaced along bearer length
  const nJoists=Math.ceil(joistRun/0.45)+1;
  const joistLmTotal=Math.ceil(nJoists*joistSpan);

  // Stair riser — ceil(hmm/180) guarantees riser never exceeds 180mm (AS1657)
  const nSteps=Math.max(1,Math.ceil(hmm/180));
  const riser=nSteps>0?Math.round(hmm/nSteps):160;

  return{
    nBearerRows,nPostsPerBearer,bearerPositions,postPositions,
    joistLm:P[high?"joist140_lm":"joist90_lm"],
    joistLabel:high?"140×45":"90×45",
    joistLmTotal,totalBearerLm,
    bearerRunLength,isEW,
    dblBearer:hasBal,high,maxPostSpacing,
    nFootings,nSteps,riser,going:300,stairRun:nSteps*300,
    bearerDesc:hasBal?"2/140×45 H4 perimeter (balustrade) + 140×45 internal":"140×45 H4 MGP10"
  };
}

function calcEstimate(f){
  const L=parseFloat(f.length)||5,D=parseFloat(f.width)||4,area=L*D;
  const raised=f.deckLevel==="raised",hmm=Number(f.heightMm)||300;
  const bk=f.deckingType||"merbau",board=BOARDS[bk];
  const hasBal=f.balustradeType&&f.balustradeType!=="none";
  const boardDir=f.layoutBoard||"EW";
  const rules=structRules(L,D,hmm,hasBal,boardDir);
  const {nFootings,joistLm,joistLmTotal,totalBearerLm,isEW,dblBearer,nPostsPerBearer,nBearerRows}=rules;

  const boardCentres=(board.w+board.gap)/1000;
  const deckingLm=Math.ceil(area/boardCentres*1.10);

  const perimLm=(L+D)*2;
  // Blocking: rows perpendicular to joists at 1200mm
  const joistSpan=isEW?D:L;
  const joistRun=isEW?L:D;
  const nJoists=Math.ceil(joistRun/0.45)+1;
  const blockingRows=Math.floor(joistSpan/1.2);
  const blockingLm=Math.ceil(blockingRows*nJoists*0.09);

  const nPosts=nFootings;
  const postHm=raised?(hmm/1000)+0.3:0.3;
  const totalBolts=nPosts*2+nJoists*2;

  const fixing=FIXINGS[board.type];
  const fixingQty=Math.ceil(deckingLm*fixing.qtyPerLm);
  const oilCans=board.type!=="composite"?Math.ceil(area/12):0;

  const stairW=Math.min(Number(f.stairWidthMm)||1200,L*1000);
  const stairCost=f.stairType==="none"?0:P.stairs_base+Math.max(0,(stairW-1200)/100)*P.stairs_per100mm;
  // Stringer count: 1 each end + 1 every 1000mm if wider than 1000mm
  const nStringers=2+Math.max(0,Math.floor((stairW-1000)/1000));
  const balPerim=hasBal?Math.ceil(perimLm*0.6):0;

  // Bearer line items — split perimeter (double if balustrade) and internal
  // bearerLength = how long each bearer runs (same direction as boards)
  const bearerRunLen=isEW?L:D;
  const perimBearerLm=Math.ceil(bearerRunLen*4); // 4 perimeter sides
  const internalBearerLm=Math.ceil(bearerRunLen*Math.max(0,nBearerRows-2));

  const items=[
    {cat:"Footings",label:"Concrete footing bags 20kg",qty:nFootings*4,unit:"EA",rate:P.concrete,note:`${nFootings} footings · ${nBearerRows} rows × ${nPostsPerBearer} posts`},
    {cat:"Footings",label:"Uni-Pier adjustable post supports",qty:nPosts,unit:"EA",rate:P.unipier},
    raised?{cat:"Footings",label:`Timber posts 90×90 H4 (${postHm.toFixed(1)}m ea)`,qty:Math.ceil(nPosts*postHm),unit:"LM",rate:P.post90_lm}:null,
    hasBal?{cat:"Structure",label:"Perimeter bearers 2/140×45 H4 (dbl — balustrade load)",qty:perimBearerLm,unit:"LM",rate:P.bearer_dbl_lm}:
           {cat:"Structure",label:"Bearers 140×45 H4 MGP10",qty:perimBearerLm+internalBearerLm,unit:"LM",rate:P.bearer140_lm},
    hasBal&&internalBearerLm>0?{cat:"Structure",label:"Internal bearers 140×45 H4 MGP10",qty:internalBearerLm,unit:"LM",rate:P.bearer140_lm,note:"Single — internal rows"}:null,
    {cat:"Structure",label:`Joists ${rules.joistLabel} H3 @ 450mm ctrs`,qty:joistLmTotal,unit:"LM",rate:joistLm,note:rules.high?"Upgraded >1800mm":`${nJoists} joists × ${joistSpan.toFixed(1)}m`},
    {cat:"Structure",label:"Joist blocking 90×45 @ 1200mm",qty:blockingLm,unit:"LM",rate:P.blocking_lm},
    {cat:"Fixings",label:"Structural bolts M12×120 HDG",qty:totalBolts,unit:"EA",rate:P.bolt_m12},
    {cat:"Fixings",label:"Nuts M12 HDG",qty:totalBolts,unit:"EA",rate:P.nut_m12},
    {cat:"Fixings",label:"Washers M12 galv sq",qty:totalBolts*2,unit:"EA",rate:P.washer_m12},
    {cat:"Decking",label:`${board.label} ${board.w}×19 decking`,qty:deckingLm,unit:"LM",rate:board.price,note:`${area.toFixed(1)}m² · ${(1/boardCentres).toFixed(1)} boards/m`},
    {cat:"Decking",label:fixing.label,qty:fixingQty,unit:fixing.unit,rate:fixing.rate},
    oilCans>0?{cat:"Decking",label:"Decking oil 4L",qty:oilCans,unit:"EA",rate:P.deck_oil}:null,
    f.stairType!=="none"?{cat:"Features",label:`Stairs — ${stairW}mm wide · ${rules.nSteps} risers @ ${rules.riser}mm · ${nStringers} stringers`,qty:1,unit:"ITEM",rate:stairCost}:null,
    balPerim>0?{cat:"Features",label:"Balustrade allowance",qty:balPerim,unit:"LM",rate:P.balustrade_lm,note:"~60% perimeter"}:null,
    {cat:"Sundries",label:"Sundries & consumables",qty:1,unit:"ITEM",rate:P.sundries_base+area*P.sundries_m2},
  ].filter(Boolean);

  items.push({cat:"Labour",label:"Labour allowance",qty:Math.ceil(area),unit:"m²",rate:raised?72:55,note:"Indicative"});
  const total=items.reduce((s,i)=>s+(i.qty||0)*(i.rate||0),0);
  return{items,total,area,cats:[...new Set(items.map(i=>i.cat))],ratePerM2:area>0?total/area:0,rules};
}

function jeffFixNote(bk){
  if(BOARDS[bk].type==="composite")return`${BOARDS[bk].label} uses hidden clips — no face screws. Included.`;
  if(bk==="merbau")return"Merbau bleeds tannins — SS screws essential. Galv nails would stain your deck.";
  if(bk==="spotted_gum"||bk==="spotted_gum_140"||bk==="blue_gum")return`${BOARDS[bk].label} is very hard — pre-drilling essential. SS screws specced.`;
  return"Galv nails work fine on pine — or upgrade to SS for longevity.";
}

// Pick best render image based on user choices
function getRenderImage(form){
  const hasStairs=form.stairType!=="none";
  const hasBal=form.balustradeType&&form.balustradeType!=="none";
  // Image 1: balustrade, no prominent stairs = render-deck-balustrade.jpg
  // Image 3: stairs prominent, raised = render-deck-stairs.png
  if(hasStairs&&form.deckLevel==="raised") return{src:"render-deck-stairs.png",type:"png"};
  if(hasBal) return{src:"render-deck-balustrade.jpg",type:"jpg"};
  if(hasStairs) return{src:"render-deck-stairs.png",type:"png"};
  return{src:"render-deck-balustrade.jpg",type:"jpg"};
}

                Dm:parseFloat(form.width)||4,
                hasBal:form.concreteHasBal||false,
                finish:form.concreteFinish||"trowel",
                hasServices:form.concreteServices||false,
                houseWall:form.houseWall||"bottom",

            : calcDeck({
                Lm:parseFloat(form.length)||5,
                Dm:parseFloat(form.width)||4,
                FFL:Number(form.heightMm)||300,
                boardDir:form.layoutBoard||"EW",
                deckingType:form.deckingType||"merbau",
                boardWidthMm:(BOARDS[form.deckingType]||BOARDS.merbau).w,
                balustradeType:form.balustradeType||"none",
                hasStairs:true,

          const D=R.draw;

          // ── FIXED CANVAS & PLACEHOLDER ZONES ─────────────────

          const CVS_W=500, CVS_H=420;
          const ZONE_TOP=42;    // title + N + A circle
          const ZONE_BOT=48;    // S + A circle + length dim
          const ZONE_LFT=62;    // W label + depth dim
          const ZONE_RGT=52;    // E label + depth dim
          const DRAW_W=CVS_W-ZONE_LFT-ZONE_RGT;  // 386px
          const DRAW_H=CVS_H-ZONE_TOP-ZONE_BOT;  // 330px

          // Scale: deck fits in drawing zone
          const SC=Math.min(DRAW_W/(D.deckWmm), DRAW_H/(D.deckDmm));

          const deckWpx=D.deckWmm*SC;
          const deckDpx=D.deckDmm*SC;

          // Deck centred in drawing zone
          const OX=ZONE_LFT+(DRAW_W-deckWpx)/2;

          const stWpx=D.hasStairs?Math.min(D.stairWidthMm*SC, deckWpx*0.6):0;
          // Stair position rule:
          // standard/wide = projects OUTSIDE deck perimeter
          // landing = set back INSIDE deck perimeter (inset stair)
          const isInset=form.stairType==="landing";
          const stairRects={
            N:{x:OX+(deckWpx-stWpx)/2, y:isInset?OY:OY-stRunPx, w:stWpx, h:stRunPx},
            S:{x:OX+(deckWpx-stWpx)/2, y:isInset?OY+deckDpx-stRunPx:OY+deckDpx, w:stWpx, h:stRunPx},
            E:{x:isInset?OX+deckWpx-stRunPx:OX+deckWpx, y:OY+(deckDpx-stWpx)/2, w:stRunPx, h:stWpx},
            W:{x:isInset?OX:OX-stRunPx, y:OY+(deckDpx-stWpx)/2, w:stRunPx, h:stWpx},
          };
          const sr=D.hasStairs?(stairRects[D.stairFace]||stairRects.S):null;

          // Fixed placeholder positions
          const midX=OX+deckWpx/2;  // deck horizontal centre
          const midY=OY+deckDpx/2;  // deck vertical centre

          // Section cut line — always through deck centre
          const sectNS=D.sectionCutDir==="NS";

          // Footing grid
          const bRowYs=Array.from({length:R.nBearerRows},(_,i)=>OY+(i/Math.max(1,R.nBearerRows-1))*deckDpx);
          const bColXs=Array.from({length:R.nPostsPerRow},(_,i)=>OX+(i/Math.max(1,R.nPostsPerRow-1))*deckWpx);

          const ns="http://www.w3.org/2000/svg";
          const e=(tag,attrs,txt)=>{
            const el=document.createElementNS(ns,tag);
            Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,String(v)));
            if(txt!==undefined)el.textContent=txt;
            return el;
          };

          return React.createElement("div",null,
            React.createElement("div",{style:{fontSize:10,fontWeight:600,color:"#888",
              textTransform:"uppercase",letterSpacing:1,marginBottom:8}},"Plan view"),
            React.createElement("div",{
              key:`pv-${form.alfrescoZone}-${form.bbqZone}-${form.layoutStairs}-${form.stairType}-${form.houseWall}`,
              key:`sect-${D.Dm}-${D.FFL}-${D.boardDir}-${D.stairFace}-${form.stairType}-${D.hasBal}`,
              ref:ref=>{
              if(!ref)return; ref.innerHTML="";
              const svg=document.createElementNS(ns,"svg");
              svg.setAttribute("width","100%");
              svg.setAttribute("viewBox",`0 0 ${CVS_W} ${CVS_H}`);
              svg.style.cssText="display:block;background:white;border-radius:10px;border:1px solid #e5e5e5;margin-bottom:8px";
              const add=el=>svg.appendChild(el);

              // ── TOP ZONE ─────────────────────────────────────
              // Title — top left
              // No title line — rule: plan view is self-explanatory with dims
              // N label — tight to top of deck
              add(e("text",{x:midX,y:OY-3,fontSize:7,fill:"#ddd","text-anchor":"middle"},"N"));
              // A circle top — below N
              add(e("circle",{cx:sectNS?midX:ZONE_LFT-14,cy:sectNS?28:midY,r:6,fill:"white",stroke:"#888","stroke-width":"0.8"}));
              add(e("text",{x:sectNS?midX:ZONE_LFT-14,y:sectNS?32:midY+3,fontSize:7,fill:"#888","text-anchor":"middle","font-weight":"600"},"A"));

              // ── BOTTOM ZONE ───────────────────────────────────
              // S label — tight to bottom of deck
              add(e("text",{x:midX,y:OY+deckDpx+10,fontSize:7,fill:"#ddd","text-anchor":"middle"},"S"));
              // A circle bottom
              add(e("circle",{cx:sectNS?midX:CVS_W-ZONE_RGT+14,cy:sectNS?CVS_H-22:midY,r:6,fill:"white",stroke:"#888","stroke-width":"0.8"}));
              add(e("text",{x:sectNS?midX:CVS_W-ZONE_RGT+14,y:sectNS?CVS_H-18:midY+3,fontSize:7,fill:"#888","text-anchor":"middle","font-weight":"600"},"A"));
              // Length dim — bottom centre
              const dimY=CVS_H-10;
              add(e("line",{x1:OX,y1:dimY-4,x2:OX+deckWpx,y2:dimY-4,stroke:"#555","stroke-width":"0.6"}));
              add(e("line",{x1:OX,y1:dimY-7,x2:OX,y2:dimY-1,stroke:"#555","stroke-width":"0.6"}));
              add(e("line",{x1:OX+deckWpx,y1:dimY-7,x2:OX+deckWpx,y2:dimY-1,stroke:"#555","stroke-width":"0.6"}));
              add(e("text",{x:midX,y:dimY+6,fontSize:9,fill:"#333","text-anchor":"middle"},`${D.Lm}m`));

              // ── LEFT ZONE ─────────────────────────────────────
              // W label — tight to left of deck
              add(e("text",{x:OX-5,y:midY+3,fontSize:7,fill:"#ddd","text-anchor":"end"},"W"));
              // Depth dim
              const dimX=ZONE_LFT-28;
              add(e("line",{x1:dimX,y1:OY,x2:dimX,y2:OY+deckDpx,stroke:"#555","stroke-width":"0.6"}));
              add(e("line",{x1:dimX-3,y1:OY,x2:dimX+3,y2:OY,stroke:"#555","stroke-width":"0.6"}));
              add(e("line",{x1:dimX-3,y1:OY+deckDpx,x2:dimX+3,y2:OY+deckDpx,stroke:"#555","stroke-width":"0.6"}));
              add(e("text",{x:dimX-14,y:midY+3,fontSize:9,fill:"#333","text-anchor":"middle",
                transform:`rotate(-90,${dimX-14},${midY})`},`${D.Dm}m`));

              // ── RIGHT ZONE ────────────────────────────────────
              // E label — tight to right of deck
              add(e("text",{x:OX+deckWpx+5,y:midY+3,fontSize:7,fill:"#ddd","text-anchor":"start"},"E"));

              // ── SECTION CUT LINE ──────────────────────────────
              if(sectNS){
                add(e("line",{x1:midX,y1:ZONE_TOP-14,x2:midX,y2:CVS_H-ZONE_BOT+14,
                  stroke:"#aaa","stroke-width":"0.6","stroke-dasharray":"8,3,2,3"}));
              } else {
                add(e("line",{x1:ZONE_LFT-14,y1:midY,x2:CVS_W-ZONE_RGT+14,y2:midY,
                  stroke:"#aaa","stroke-width":"0.6","stroke-dasharray":"8,3,2,3"}));
              }

              // ── HOUSE WALL (thick line) ───────────────────────
              const hwLine={
                top:   [OX,OY,OX+deckWpx,OY],
                bottom:[OX,OY+deckDpx,OX+deckWpx,OY+deckDpx],
                left:  [OX,OY,OX,OY+deckDpx],
                right: [OX+deckWpx,OY,OX+deckWpx,OY+deckDpx],
              };
              const hl=hwLine[D.houseWall]||hwLine.bottom;
              add(e("line",{x1:hl[0],y1:hl[1],x2:hl[2],y2:hl[3],stroke:"#1a1a1a","stroke-width":"4"}));

                            // ── STAIR RECTANGLE — same rules regardless of riser count ──
              // 1 step at ground level = 300mm going, shown same as any stair
              if(sr&&!isInset){
                add(e("rect",{x:sr.x,y:sr.y,width:sr.w,height:sr.h,
                  fill:"#F5F0E8",stroke:"#1a1a1a","stroke-width":"0.8","stroke-dasharray":"4,3"}));
                const isNS=D.stairFace==="N"||D.stairFace==="S";
                for(let i=1;i<D.stair.nRisers;i++){
                  const f=i/D.stair.nRisers;
                  if(isNS){
                    const ty=D.stairFace==="S"?sr.y+f*sr.h:sr.y+(1-f)*sr.h;
                    add(e("line",{x1:sr.x,y1:ty,x2:sr.x+sr.w,y2:ty,stroke:"#ccc","stroke-width":"0.5"}));
                  } else {
                    const tx=D.stairFace==="E"?sr.x+f*sr.w:sr.x+(1-f)*sr.w;
                    add(e("line",{x1:tx,y1:sr.y,x2:tx,y2:sr.y+sr.h,stroke:"#ccc","stroke-width":"0.5"}));
                  }
                }
              }

              // ── DECK OUTLINE ──────────────────────────────────
              add(e("rect",{x:OX,y:OY,width:deckWpx,height:deckDpx,
                fill:"#FAFAF8",stroke:"#1a1a1a","stroke-width":"1.2"}));

              // ── BOARD LINES (very light) ──────────────────────
              const isEW=D.boardDir==="EW";
              const bStep=Math.max(4, (isEW?D.decking.W:D.decking.W)*SC);
              const bCount=Math.floor((isEW?deckDpx:deckWpx)/bStep);
              for(let i=1;i<bCount;i++){
                const p=i*bStep;
                add(e("line",{
                  x1:isEW?OX:OX+p,         y1:isEW?OY+p:OY,
                  x2:isEW?OX+deckWpx:OX+p, y2:isEW?OY+p:OY+deckDpx,
                  stroke:"#e8e8e8","stroke-width":"0.5"}));
              }

              // ── BEARER LINES ──────────────────────────────────
              bRowYs.forEach(by=>add(e("line",{x1:OX,y1:by,x2:OX+deckWpx,y2:by,
                stroke:"#bbb","stroke-width":"0.6"})));

              // ── FOOTING DOTS ──────────────────────────────────
              bRowYs.forEach(by=>bColXs.forEach(bx=>{
                add(e("circle",{cx:bx,cy:by,r:4,fill:"#1a1a1a",stroke:"white","stroke-width":"1.2"}));
              }));

              // ── INSET STAIR (drawn last — on top of deck outline) ──
              if(sr&&isInset){
                add(e("rect",{x:sr.x,y:sr.y,width:sr.w,height:sr.h,
                  fill:"#EDE8DF",stroke:"#1a1a1a","stroke-width":"1.2"}));
                const isNS=D.stairFace==="N"||D.stairFace==="S";
                for(let i=1;i<D.stair.nRisers;i++){
                  const f=i/D.stair.nRisers;
                  if(isNS){
                    const ty=D.stairFace==="S"?sr.y+f*sr.h:sr.y+(1-f)*sr.h;

          React.createElement("div",{style:{fontSize:13,color:"#777",marginBottom:12,lineHeight:1.5}},"Store multiple projects, track your estimates and share with your builder — just add your name and email and we'll send you a sign-in link. No password needed."),
          React.createElement("button",{onClick:()=>setSaveState("asking"),style:{width:"100%",height:44,borderRadius:10,fontWeight:600,fontSize:14,background:"#F7F7F7",border:`1px solid ${BD}`,color:TX}},"Save my project →")
        ),

        saveState==="asking"&&React.createElement("div",{style:{background:"white",borderRadius:14,border:`1.5px solid ${Y}`,padding:16,marginBottom:8}},
          React.createElement("div",{style:{fontSize:14,fontWeight:600,marginBottom:12}},"Save your project"),
          React.createElement("input",{value:saveName,onChange:e=>setSaveName(e.target.value),placeholder:"Your first name",
            style:{width:"100%",height:46,border:`1px solid ${BD}`,borderRadius:10,padding:"0 12px",fontSize:15,marginBottom:8}}),
          React.createElement("input",{type:"email",value:saveEmail,onChange:e=>setSaveEmail(e.target.value),placeholder:"Your email address",
            style:{width:"100%",height:46,border:`1px solid ${BD}`,borderRadius:10,padding:"0 12px",fontSize:15,marginBottom:12}}),
          React.createElement("button",{onClick:sendMagicLink,disabled:!saveEmail.trim()||!saveName.trim(),
            style:{width:"100%",height:46,borderRadius:10,fontWeight:700,fontSize:15,background:Y,border:"none",opacity:(!saveEmail.trim()||!saveName.trim())?0.5:1}},
            "Send me a sign-in link"),
          React.createElement("div",{style:{fontSize:11,color:"#aaa",textAlign:"center",marginTop:8}},"We'll email you a link — click it and you're straight in. No password ever.")
        ),

        saveState==="sending"&&React.createElement("div",{style:{background:"white",borderRadius:14,border:`1px solid ${BD}`,padding:24,textAlign:"center",marginBottom:8}},
          React.createElement("div",{style:{width:24,height:24,border:`3px solid ${BD}`,borderTopColor:Y,borderRadius:"50%",margin:"0 auto 12px"},className:"spin"}),
          React.createElement("div",{style:{fontSize:14,color:"#666"}},"Sending your sign-in link...")
        ),

        saveState==="sent"&&React.createElement("div",{style:{background:"#F0FDF4",borderRadius:14,border:"1px solid #86EFAC",padding:16,textAlign:"center",marginBottom:8}},
          React.createElement("div",{style:{fontSize:24,marginBottom:8}},"✓"),
          React.createElement("div",{style:{fontSize:15,fontWeight:600,color:"#166534",marginBottom:4}},"Check your email"),
          React.createElement("div",{style:{fontSize:13,color:"#4B7B58",lineHeight:1.5}},`We've sent a sign-in link to ${saveEmail}. Click it and your project will be waiting for you.`)
        ),

        React.createElement("button",{onClick:()=>setScreen(1),style:{background:"none",border:"none",fontSize:13,color:"#bbb",textDecoration:"underline",display:"block",margin:"8px auto 0"}},"Start a new project"),
        screen===8&&React.createElement(BackBtn,null)
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
