// ── STRUCTURAL RULES ───────────────────────────────────────────────
function structRules(L,D,hmm,hasBal){
  const high=hmm>1800,maxSpX=high?1.5:1.8,maxSpY=1.2;
  const nPX=Math.ceil(L/maxSpX)+1,nPY=Math.ceil(D/maxSpY)+1;
  const pXs=Array.from({length:nPX},(_,i)=>i*(L/Math.max(1,nPX-1)));
  const pYs=Array.from({length:nPY},(_,j)=>j*(D/Math.max(1,nPY-1)));
  const nSteps=hmm>0?Math.ceil(hmm/180):0;
  const riser=nSteps>0?Math.round(hmm/nSteps):160;
  return{pXs,pYs,joistLm:P[high?"joist140_lm":"joist90_lm"],
    joistLabel:high?"140×45":"90×45",dblBearer:hasBal,high,maxSpX,
    nFootings:nPX*nPY,nSteps,riser};
}

// ── ESTIMATE ───────────────────────────────────────────────────────
function calcEstimate(f){
  const L=parseFloat(f.length)||5,D=parseFloat(f.width)||4,area=L*D;
  const raised=f.deckLevel==="raised",hmm=Number(f.heightMm)||300;
  const bk=f.deckingType||"merbau",board=BOARDS[bk];
  const hasBal=f.balustradeType&&f.balustradeType!=="none";
  const rules=structRules(L,D,hmm,hasBal);
  const {pXs,pYs,joistLm,dblBearer,nFootings}=rules;
  const boardCentres=(board.w+board.gap)/1000;
  const deckingLm=Math.ceil(area/boardCentres*1.10);
  const bearerLm=Math.ceil(pYs.length*L);
  const perimLm=(L+D)*2;
  const joistLmTotal=Math.ceil((Math.ceil(L/0.45)+1)*D);
  const blockingLm=Math.ceil(Math.floor(D/1.2)*(Math.ceil(L/0.45)+1)*0.09);
  const nPosts=pXs.length*pYs.length;
  const postHm=raised?(hmm/1000)+0.3:0.3;
  const totalBolts=nPosts*2+Math.ceil(L/0.45)*2;
  const fixing=FIXINGS[board.type];
  const fixingQty=Math.ceil(deckingLm*fixing.qtyPerLm);
  const oilCans=board.type!=="composite"?Math.ceil(area/12):0;
  const stairW=Number(f.stairWidthMm)||1200;
  const maxStairW=L*1000;
  const actualStairW=Math.min(stairW,maxStairW);
  const stairCost=f.stairType==="none"?0:P.stairs_base+Math.max(0,(actualStairW-1200)/100)*P.stairs_per100mm;
  const balPerim=hasBal?Math.ceil(perimLm*0.6):0;
  const items=[
    {cat:"Footings",label:"Concrete footing bags 20kg",qty:nFootings*3,unit:"EA",rate:P.concrete,note:`${nFootings} footings`},
    {cat:"Footings",label:"Uni-Pier adjustable supports",qty:nPosts,unit:"EA",rate:P.unipier,note:`${nPosts} posts`},
    raised?{cat:"Footings",label:`Timber posts 90×90 H4 (${postHm.toFixed(1)}m)`,qty:Math.ceil(nPosts*postHm),unit:"LM",rate:P.post90_lm}:null,
    {cat:"Structure",label:dblBearer?"Bearers 2/140×45 H4 (dbl — balustrade)":"Bearers 140×45 H4 MGP10",qty:bearerLm,unit:"LM",rate:dblBearer?P.bearer_dbl_lm:P.bearer140_lm},
    {cat:"Structure",label:`Joists ${rules.joistLabel} H3`,qty:joistLmTotal,unit:"LM",rate:joistLm,note:rules.high?"Upgraded — deck >1800mm":""},
    {cat:"Structure",label:"Joist blocking 90×45",qty:blockingLm,unit:"LM",rate:P.blocking_lm},
    {cat:"Fixings",label:"Bolts M12×120 HDG",qty:totalBolts,unit:"EA",rate:P.bolt_m12},
    {cat:"Fixings",label:"Nuts M12 HDG",qty:totalBolts,unit:"EA",rate:P.nut_m12},
    {cat:"Fixings",label:"Washers M12 galv",qty:totalBolts*2,unit:"EA",rate:P.washer_m12},
    {cat:"Decking",label:`${board.label} ${board.w}×19 decking`,qty:deckingLm,unit:"LM",rate:board.price,note:`${area.toFixed(1)}m²`},
    {cat:"Decking",label:fixing.label,qty:fixingQty,unit:fixing.unit,rate:fixing.rate,note:fixing.note},
    oilCans>0?{cat:"Decking",label:"Decking oil 4L",qty:oilCans,unit:"EA",rate:P.deck_oil}:null,
    f.stairType!=="none"?{cat:"Features",label:`Stairs (${actualStairW}mm wide · ${rules.nSteps} risers @ ${rules.riser}mm)`,qty:1,unit:"ITEM",rate:stairCost}:null,
    balPerim>0?{cat:"Features",label:"Balustrade allowance",qty:balPerim,unit:"LM",rate:P.balustrade_lm,note:"~60% perimeter"}:null,
    {cat:"Sundries",label:"Sundries & consumables",qty:1,unit:"ITEM",rate:P.sundries_base+area*P.sundries_m2},
  ].filter(Boolean);
  const labourRate=raised?72:55;
  items.push({cat:"Labour",label:"Labour allowance",qty:Math.ceil(area),unit:"m²",rate:labourRate,note:"Indicative"});
  const total=items.reduce((s,i)=>s+(i.qty||0)*(i.rate||0),0);
  return{items,total,area,cats:[...new Set(items.map(i=>i.cat))],ratePerM2:area>0?total/area:0,rules};
}

// ── JEFF NOTES ─────────────────────────────────────────────────────
function jeffFixNote(bk){
  const b=BOARDS[bk];
  if(b.type==="composite")return`${b.label} uses hidden clips — no face screws. I've included them.`;
  if(bk==="merbau")return"Merbau bleeds tannins — I've specced SS screws. Galv nails would stain your deck.";
  if(bk==="spotted_gum"||bk==="blue_gum")return`${b.label} is very hard — pre-drilling essential. SS screws specced.`;
  return"Galv nails work fine on pine — or upgrade to SS for longevity.";
}
