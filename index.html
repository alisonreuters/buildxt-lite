// Wind regions by postcode range (simplified Australian regions)
function getWindRegion(pc){
  const n=parseInt(pc);
  if(!n)return{region:"N3",terrain:"TC2",desc:"Standard suburban"};
  // QLD coastal
  if(n>=4000&&n<=4299)return{region:"C",terrain:"TC2",desc:"Queensland coastal — cyclonic zone"};
  if(n>=4300&&n<=4999)return{region:"B",terrain:"TC2",desc:"Queensland inland"};
  // NSW coastal
  if((n>=2000&&n<=2263)||(n>=2508&&n<=2530))return{region:"A4",terrain:"TC1",desc:"NSW coastal exposed"};
  if(n>=2000&&n<=2999)return{region:"A3",terrain:"TC2",desc:"NSW suburban"};
  // VIC
  if(n>=3000&&n<=3999)return{region:"A3",terrain:"TC2",desc:"Victoria"};
  // WA coastal
  if(n>=6000&&n<=6214)return{region:"A5",terrain:"TC1",desc:"WA coastal"};
  if(n>=6000&&n<=6999)return{region:"A3",terrain:"TC2",desc:"WA inland"};
  // SA
  if(n>=5000&&n<=5999)return{region:"A3",terrain:"TC2",desc:"South Australia"};
  // NT
  if(n>=800&&n<=999)return{region:"C",terrain:"TC1",desc:"Northern Territory — cyclonic zone"};
  // TAS
  if(n>=7000&&n<=7999)return{region:"A4",terrain:"TC2",desc:"Tasmania"};
  return{region:"A3",terrain:"TC2",desc:"Standard suburban"};
}

function structRules(L,D,hmm,hasBal,boardDir){
  const high=hmm>1800;
  const maxPostSpacing=high?1.5:1.8; // max post spacing along bearer
  const maxBearerSpan=1.8;           // max bearer spacing — joists span between bearers (AS1684)

  // Board direction determines bearer/joist orientation:
  // E-W boards → joists run N-S → bearers run E-W → posts along E-W at maxPostSpacing
  // N-S boards → joists run E-W → bearers run N-S → posts along N-S at maxPostSpacing
  const isEW=(boardDir||"EW")==="EW";

  // CORRECT STRUCTURAL LOGIC:
  // Boards EW → Joists NS (perpendicular to boards) → Bearers EW (perpendicular to joists)
  // Boards NS → Joists EW (perpendicular to boards) → Bearers NS (perpendicular to joists)
  // Bearers always run SAME direction as boards
  // Joists always run PERPENDICULAR to boards

  // Bearer rows run along their length — bearers span across the SHORT joist direction
  // For EW boards: bearers run EW (length=L), spaced along D at maxBearerSpan (joist span)
  // For NS boards: bearers run NS (length=D), spaced along L at maxBearerSpan (joist span)
  const bearerLength= isEW ? L : D;        // how long each bearer is
  const joistSpanDim= isEW ? D : L;        // dimension joists span across (between bearers)
  const postRunDim=   isEW ? L : D;        // dimension posts run along (along bearer)

  const nBearerRows= Math.ceil(joistSpanDim/maxBearerSpan)+1;
  const nPostsPerBearer= Math.ceil(postRunDim/maxPostSpacing)+1;

  // Bearer positions spaced across joist span dimension
  const bearerPositions=Array.from({length:nBearerRows},(_,i)=>
    i*(joistSpanDim/Math.max(1,nBearerRows-1))
  );
  // Post positions along bearer length
  const postPositions=Array.from({length:nPostsPerBearer},(_,i)=>
    i*(postRunDim/Math.max(1,nPostsPerBearer-1))
  );

  const nFootings=nBearerRows*nPostsPerBearer;

  // Bearer lengths: perimeter bearers + internal bearers
  // Perimeter = 4 sides. Internal = (nBearerRows-2) rows
  const bearerRunLength=isEW?L:D;
  const perimBearerLm=bearerRunLength*4; // 4 perimeter sides (approx — 2 long + 2 short)
  const internalBearerLm=bearerRunLength*Math.max(0,nBearerRows-2);
  // Double perimeter bearers if balustrade, single internal
  const totalBearerLm=Math.ceil((hasBal?perimBearerLm*2:perimBearerLm)+internalBearerLm);

  // Joist length and count
  // Joists run PERPENDICULAR to boards, spanning between bearers
  // For EW boards: joists run NS, spanning D, spaced along L
  // For NS boards: joists run EW, spanning L, spaced along D
  const joistSpan=isEW?D:L;    // joist length = spans across bearer rows
  const joistRun=isEW?L:D;     // joists spaced along bearer length
  const nJoists=Math.ceil(joistRun/0.45)+1;
  const joistLmTotal=Math.ceil(nJoists*joistSpan);

  // Stair riser — ceil(hmm/180) guarantees riser never exceeds 180mm (AS1657)
  const nSteps=hmm>0?Math.ceil(hmm/180):0;
  const riser=nSteps>0?Math.round(hmm/nSteps):160;

  return{
    nBearerRows,nPostsPerBearer,bearerPositions,postPositions,
    joistLm:P[high?"joist140_lm":"joist90_lm"],
    joistLabel:high?"140×45":"90×45",
    joistLmTotal,totalBearerLm,
    bearerRunLength,isEW,
    dblBearer:hasBal,high,maxPostSpacing,
    nFootings,nSteps,riser,going:300,stairRun:nSteps*300,
    bearerDesc:hasBal?"2/140×45 H4 perimeter (balustrade) + 140×45 internal":"140×45 H4 MGP10"
  };
}

function calcEstimate(f){
  const L=parseFloat(f.length)||5,D=parseFloat(f.width)||4,area=L*D;
  const raised=f.deckLevel==="raised",hmm=Number(f.heightMm)||300;
  const bk=f.deckingType||"merbau",board=BOARDS[bk];
  const hasBal=f.balustradeType&&f.balustradeType!=="none";
  const boardDir=f.layoutBoard||"EW";
  const rules=structRules(L,D,hmm,hasBal,boardDir);
  const {nFootings,joistLm,joistLmTotal,totalBearerLm,isEW,dblBearer,nPostsPerBearer,nBearerRows}=rules;

  const boardCentres=(board.w+board.gap)/1000;
  const deckingLm=Math.ceil(area/boardCentres*1.10);

  const perimLm=(L+D)*2;
  // Blocking: rows perpendicular to joists at 1200mm
  const joistSpan=isEW?D:L;
  const joistRun=isEW?L:D;
  const nJoists=Math.ceil(joistRun/0.45)+1;
  const blockingRows=Math.floor(joistSpan/1.2);
  const blockingLm=Math.ceil(blockingRows*nJoists*0.09);

  const nPosts=nFootings;
  const postHm=raised?(hmm/1000)+0.3:0.3;
  const totalBolts=nPosts*2+nJoists*2;

  const fixing=FIXINGS[board.type];
  const fixingQty=Math.ceil(deckingLm*fixing.qtyPerLm);
  const oilCans=board.type!=="composite"?Math.ceil(area/12):0;

  const stairW=Math.min(Number(f.stairWidthMm)||1200,L*1000);
  const stairCost=f.stairType==="none"?0:P.stairs_base+Math.max(0,(stairW-1200)/100)*P.stairs_per100mm;
  const balPerim=hasBal?Math.ceil(perimLm*0.6):0;

  // Bearer line items — split perimeter (double if balustrade) and internal
  // bearerLength = how long each bearer runs (same direction as boards)
  const bearerRunLen=isEW?L:D;
  const perimBearerLm=Math.ceil(bearerRunLen*4); // 4 perimeter sides
  const internalBearerLm=Math.ceil(bearerRunLen*Math.max(0,nBearerRows-2));

  const items=[
    {cat:"Footings",label:"Concrete footing bags 20kg",qty:nFootings*3,unit:"EA",rate:P.concrete,note:`${nFootings} footings · ${nBearerRows} rows × ${nPostsPerBearer} posts`},
    {cat:"Footings",label:"Uni-Pier adjustable post supports",qty:nPosts,unit:"EA",rate:P.unipier},
    raised?{cat:"Footings",label:`Timber posts 90×90 H4 (${postHm.toFixed(1)}m ea)`,qty:Math.ceil(nPosts*postHm),unit:"LM",rate:P.post90_lm}:null,
    hasBal?{cat:"Structure",label:"Perimeter bearers 2/140×45 H4 (dbl — balustrade load)",qty:perimBearerLm,unit:"LM",rate:P.bearer_dbl_lm}:
           {cat:"Structure",label:"Bearers 140×45 H4 MGP10",qty:perimBearerLm+internalBearerLm,unit:"LM",rate:P.bearer140_lm},
    hasBal&&internalBearerLm>0?{cat:"Structure",label:"Internal bearers 140×45 H4 MGP10",qty:internalBearerLm,unit:"LM",rate:P.bearer140_lm,note:"Single — internal rows"}:null,
    {cat:"Structure",label:`Joists ${rules.joistLabel} H3 @ 450mm ctrs`,qty:joistLmTotal,unit:"LM",rate:joistLm,note:rules.high?"Upgraded >1800mm":`${nJoists} joists × ${joistSpan.toFixed(1)}m`},
    {cat:"Structure",label:"Joist blocking 90×45 @ 1200mm",qty:blockingLm,unit:"LM",rate:P.blocking_lm},
    {cat:"Fixings",label:"Structural bolts M12×120 HDG",qty:totalBolts,unit:"EA",rate:P.bolt_m12},
    {cat:"Fixings",label:"Nuts M12 HDG",qty:totalBolts,unit:"EA",rate:P.nut_m12},
    {cat:"Fixings",label:"Washers M12 galv sq",qty:totalBolts*2,unit:"EA",rate:P.washer_m12},
    {cat:"Decking",label:`${board.label} ${board.w}×19 decking`,qty:deckingLm,unit:"LM",rate:board.price,note:`${area.toFixed(1)}m² · ${(1/boardCentres).toFixed(1)} boards/m`},
    {cat:"Decking",label:fixing.label,qty:fixingQty,unit:fixing.unit,rate:fixing.rate},
    oilCans>0?{cat:"Decking",label:"Decking oil 4L",qty:oilCans,unit:"EA",rate:P.deck_oil}:null,
    f.stairType!=="none"?{cat:"Features",label:`Stairs — ${stairW}mm wide · ${rules.nSteps} risers @ ${rules.riser}mm`,qty:1,unit:"ITEM",rate:stairCost}:null,
    balPerim>0?{cat:"Features",label:"Balustrade allowance",qty:balPerim,unit:"LM",rate:P.balustrade_lm,note:"~60% perimeter"}:null,
    {cat:"Sundries",label:"Sundries & consumables",qty:1,unit:"ITEM",rate:P.sundries_base+area*P.sundries_m2},
  ].filter(Boolean);

  items.push({cat:"Labour",label:"Labour allowance",qty:Math.ceil(area),unit:"m²",rate:raised?72:55,note:"Indicative"});
  const total=items.reduce((s,i)=>s+(i.qty||0)*(i.rate||0),0);
  return{items,total,area,cats:[...new Set(items.map(i=>i.cat))],ratePerM2:area>0?total/area:0,rules};
}

function jeffFixNote(bk){
  if(BOARDS[bk].type==="composite")return`${BOARDS[bk].label} uses hidden clips — no face screws. Included.`;
  if(bk==="merbau")return"Merbau bleeds tannins — SS screws essential. Galv nails would stain your deck.";
  if(bk==="spotted_gum"||bk==="blue_gum")return`${BOARDS[bk].label} is very hard — pre-drilling essential. SS screws specced.`;
  return"Galv nails work fine on pine — or upgrade to SS for longevity.";
}

// Pick best render image based on user choices
function getRenderImage(form){
  const hasStairs=form.stairType!=="none";
  const hasBal=form.balustradeType&&form.balustradeType!=="none";
  // Image 1: balustrade, no prominent stairs = render-deck-balustrade.jpg
  // Image 3: stairs prominent, raised = render-deck-stairs.png
  if(hasStairs&&form.deckLevel==="raised") return{src:"render-deck-stairs.png",type:"png"};
  if(hasBal) return{src:"render-deck-balustrade.jpg",type:"jpg"};
  if(hasStairs) return{src:"render-deck-stairs.png",type:"png"};
  return{src:"render-deck-balustrade.jpg",type:"jpg"};
}

          React.createElement("div",{style:{fontSize:13,color:"#4B7B58",lineHeight:1.5}},`We've sent a sign-in link to ${saveEmail}. Click it and your project will be waiting for you.`)
        ),

        React.createElement("button",{onClick:()=>setScreen(1),style:{background:"none",border:"none",fontSize:13,color:"#bbb",textDecoration:"underline",display:"block",margin:"8px auto 0"}},"Start a new project"),
        screen===7&&React.createElement(BackBtn,null)
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
